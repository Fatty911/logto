name: Sync upstream

on:
  schedule:
    - cron: '*/10 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: git remote add upstream https://github.com/logto-io/logto.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check if merge is needed
        id: check
        run: |
          current=$(git rev-parse HEAD)
          
          for branch in main master; do
            if upstream=$(git rev-parse upstream/$branch 2>/dev/null); then
              echo "upstream_branch=$branch" >> $GITHUB_OUTPUT
              break
            fi
          done
          
          if [ -z "$upstream_branch" ]; then
            echo "Error: Could not find upstream branch (tried main and master)" >&2
            exit 1
          fi
          
          if [ "$current" != "$upstream" ]; then
            echo "need_sync=true" >> $GITHUB_OUTPUT
          else
            echo "need_sync=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream
        if: steps.check.outputs.need_sync == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git merge upstream/${{ steps.check.outputs.upstream_branch }} --no-edit
          git push
