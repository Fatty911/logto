name: Sync upstream

on:
  schedule:
    - cron: '*/10 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: git remote add upstream https://github.com/logto-io/logto.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check if merge is needed
        id: check
        run: |
          for upstream_branch in main master; do
            for local_branch in main master; do
              if git rev-parse "$local_branch" >/dev/null 2>&1 && \
                 upstream=$(git rev-parse "upstream/$upstream_branch" 2>/dev/null); then
                echo "upstream_branch=$upstream_branch" >> $GITHUB_OUTPUT
                echo "local_branch=$local_branch" >> $GITHUB_OUTPUT
                break 2
              fi
            done
          done
          
          if [ -z "$upstream_branch" ] || [ -z "$local_branch" ]; then
            echo "Error: Could not find valid branch combination (tried main/master for both upstream and local)" >&2
            exit 1
          fi
          
          current=$(git rev-parse "$local_branch")
          if [ "$current" != "$upstream" ]; then
            echo "need_sync=true" >> $GITHUB_OUTPUT
          else
            echo "need_sync=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream
        if: steps.check.outputs.need_sync == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git merge upstream/${{ steps.check.outputs.upstream_branch }} --no-edit
          git push origin ${{ steps.check.outputs.local_branch }}
